<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>セリフ編集ツール</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./config/char-highlight.css" />
  </head>
  <body>
    <header>
      <h1>セリフ編集ツール</h1>
      <div style="display: flex; align-items: center; gap: 12px">
        <span
          id="save-status"
          style="
            font-size: 0.8rem;
            color: #aaa;
            min-width: 120px;
            text-align: right;
          "
        ></span>
        <span id="filename-label" style="font-size: 0.8rem; color: #aaa"
          >edit/edit.csv</span
        >
      </div>
    </header>

    <div id="open-area" class="open-area" style="display: none">
      <p id="open-msg">
        edit/edit.csv への接続が切れました。<br />もう一度ファイルを選択してください。
      </p>
      <button
        class="btn btn-save"
        id="open-btn"
        style="font-size: 1rem; padding: 12px 32px"
      >
        edit/edit.csv を開く
      </button>
    </div>

    <div class="toolbar" id="toolbar" style="display: none">
      <button class="btn btn-convert" id="normalize-names-btn">自動修正</button>
      <button class="btn btn-export" id="export-txt-btn">テキスト出力</button>
      <button class="btn btn-add" id="add-row-btn">＋ 行を追加</button>
    </div>

    <div class="table-wrapper" id="table-wrapper" style="display: none">
      <table>
        <thead>
          <tr>
            <th style="width: 180px">code</th>
            <th style="width: 10px">start</th>
            <th style="width: 10px">reset</th>
            <th style="width: 10px">show</th>
            <th style="width: 160px">背景</th>
            <th style="width: 140px">音楽</th>
            <th style="width: 160px">立ち絵</th>
            <th style="width: 130px">名前</th>
            <th>セリフ</th>
            <th style="width: 12px">数</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <p id="empty-hint" style="display: none">
        行がありません。「＋ 行を追加」で追加できます。
      </p>

      <div id="output-wrapper" class="output-wrapper" style="display: none">
        <div class="output-header">
          <span>テキスト出力（コピペ用）</span>
          <button class="btn btn-copy" id="copy-output-btn">コピー</button>
        </div>
        <textarea id="output-text" class="output-text" readonly></textarea>
      </div>
    </div>

    <script src="./config/index.js"></script>
    <script src="./csv-utils.js"></script>
    <script src="./js/db.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/scenario.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
